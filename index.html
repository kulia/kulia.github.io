  <style>
    :root {
      --parchment: #EDE8DF;
      --ink: #1E1C19;
      --warm: #3D3830;
      --muted: rgba(61, 56, 48, 0.48);
      --faint: rgba(61, 56, 48, 0.22);
      --ghost: rgba(61, 56, 48, 0.09);
      --gold: #8E7E5A;
      --gold-line: rgba(142, 126, 90, 0.30);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'EB Garamond', 'Times New Roman', serif;
      background: var(--parchment);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      overflow: hidden;
      cursor: default;
    }

    ::selection {
      background: rgba(142, 126, 90, 0.22);
    }

    /* Cotton paper grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* Soft vignette — gives the parchment physical depth */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9;
      background: radial-gradient(120% 95% at 50% 40%,
          rgba(255, 255, 255, 0) 45%,
          rgba(61, 56, 48, 0.05) 100%);
    }

    a {
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Engraved plate border ── */
    .frame {
      position: fixed;
      inset: 18px;
      z-index: 4;
      pointer-events: none;
      border: 1px solid rgba(61, 56, 48, 0.15);
      opacity: 0;
      animation: fade-in 1.8s 1.7s ease forwards;
    }

    .frame::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(142, 126, 90, 0.22);
    }

    /* ── Lorenz canvas ── */
    #lorenz {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      animation: fade-in 1.5s 0.4s ease-out forwards;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ── Page ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      width: 100%;
    }

    /* ── Upper block: monogram + lockup at 1/3 ── */
    .upper {
      position: absolute;
      top: 33.3%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .monogram {
      width: 36px;
      height: 37px;
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: rise 1.4s 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .monogram svg {
      width: 100%;
      height: 100%;
    }

    .monogram-fill {
      fill: rgba(61, 56, 48, 0.18);
      filter:
        drop-shadow(-0.8px -0.8px 0px rgba(255, 255, 255, 0.65)) drop-shadow(0.8px 0.8px 0.5px rgba(61, 56, 48, 0.12));
    }

    .title {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-weight: 500;
    }

    /* letter-spacing leaves a trailing space after the last glyph —
       compensate on the left so the optical centre matches the box centre */
    .title-name {
      font-size: clamp(2.6rem, 5.2vw, 4.6rem);
      letter-spacing: 0.24em;
      padding-left: 0.24em;
      text-transform: uppercase;
      user-select: none;
      color: rgba(61, 56, 48, 0.28);
      text-shadow:
        -1px -1px 0px rgba(255, 255, 255, 0.70),
        1px 1px 0px rgba(61, 56, 48, 0.14),
        0px 1px 2px rgba(61, 56, 48, 0.06);
      opacity: 0;
      animation: rise 1.4s 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .title-descriptor {
      font-size: clamp(0.62rem, 1.15vw, 0.84rem);
      font-weight: 500;
      letter-spacing: 0.62em;
      padding-left: 0.62em;
      text-transform: uppercase;
      user-select: none;
      margin-top: 1.05rem;
      color: rgba(61, 56, 48, 0.32);
      text-shadow:
        -0.7px -0.7px 0px rgba(255, 255, 255, 0.60),
        0.7px 0.7px 0px rgba(61, 56, 48, 0.10);
      opacity: 0;
      animation: rise 1.4s 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Lower block: ornament + tagline at 2/3 ── */
    .lower {
      position: absolute;
      top: 66.6%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.1rem;
      opacity: 0;
      animation: rise 1.4s 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .orn-line {
      width: 32px;
      height: 0;
      border-top: 1px solid var(--gold-line);
    }

    .orn-diamond {
      width: 4px;
      height: 4px;
      border: 1px solid var(--gold);
      opacity: 0.4;
      transform: rotate(45deg);
    }

    .tagline {
      font-size: 0.82rem;
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--muted);
      opacity: 0;
      animation: rise 1.4s 1.15s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Footer ── */
    footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 0 4rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: rise 1.4s 1.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .footer-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.75rem;
    }

    .footer-text {
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--faint);
      text-transform: uppercase;
      min-width: 5.5em;
    }

    .footer-text-left {
      text-align: right;
    }

    .footer-text-right {
      text-align: left;
    }

    .footer-ornament {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .footer-line {
      width: 28px;
      height: 1px;
      background: var(--ghost);
    }

    .footer-diamond {
      width: 4px;
      height: 4px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.4;
    }

    .footer-legal {
      font-size: 0.5625rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(61, 56, 48, 0.22);
      text-transform: uppercase;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .upper {
        top: 30%;
      }

      .lower {
        top: 70%;
      }

      .frame {
        inset: 12px;
      }

      .frame::before {
        inset: 3px;
      }

      .title-descriptor {
        letter-spacing: 0.48em;
        padding-left: 0.48em;
      }

      footer {
        padding: 0 1.5rem 2rem;
      }

      .footer-ornament {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .frame,
      #lorenz,
      .monogram,
      .title-name,
      .title-descriptor,
      .ornament,
      .tagline,
      footer {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!--

        ᚲ ᚢ ᛚ ᛁ ᚨ

  -->

  <canvas id="lorenz"></canvas>
  <div class="frame" aria-hidden="true"></div>

  <script>
    (function () {
      const canvas = document.getElementById('lorenz');
      const ctx = canvas.getContext('2d');
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      let w, h, dpr;

      // ᚲᚢᛚᛁᚨ — for den som ser etter
      const plate = 'background:#EDE8DF;color:#3D3830;font-family:"EB Garamond",Garamond,"Times New Roman",serif;padding:6px 14px;';
      console.log('%cK U L I A', plate + 'font-size:16px;letter-spacing:0.3em;');
      console.log('%cẋ = σ(y − x)\nẏ = x(ρ − z) − y\nż = xy − βz\n\nσ = 10 · ρ = 28 · β = 8⁄3', plate + 'font-size:13px;font-style:italic;line-height:1.7;');
      console.log('%cDeterministisk. Aperiodisk. Diskret.', plate + 'font-size:11px;letter-spacing:0.1em;');

      // Gyllent blekk på Edward N. Lorenz' fødselsdag (23. mai 1917)
      const today = new Date();
      let gilded = today.getMonth() === 4 && today.getDate() === 23;
      if (gilded) console.log('%c23. mai — Edward N. Lorenz, 1917. Gyllent blekk i dag.', plate + 'font-size:11px;font-style:italic;');

      // Lorenz system — random seed each visit
      const sigma = 10, rho = 28, beta = 8 / 3;
      const dt = 0.002;
      let lx = (Math.random() - 0.5) * 2;
      let ly = (Math.random() - 0.5) * 2;
      let lz = Math.random() * 5 + 20;

      // Trail stores raw 3D state; projection happens at draw time
      // so the drawing survives window resizes intact.
      const maxTrail = 5500;
      const trail = [];

      function step() {
        const dx = sigma * (ly - lx) * dt;
        const dy = (lx * (rho - lz) - ly) * dt;
        const dz = (lx * ly - beta * lz) * dt;
        lx += dx; ly += dy; lz += dz;

        const vx = sigma * (ly - lx);
        const vy = lx * (rho - lz) - ly;
        const vz = lx * ly - beta * lz;

        trail.push({ x: lx, y: ly, z: lz, speed: Math.sqrt(vx * vx + vy * vy + vz * vz) });
        if (trail.length > maxTrail) trail.shift();
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        const len = trail.length;
        if (len < 2) return;

        // Centered at 50% of page height — between the 1/3 and 2/3 text
        const scale = Math.min(w, h) * 0.013;
        const cx = w * 0.50;
        const cy = h * 0.50;

        let minSpeed = Infinity, maxSpeed = 0;
        for (let i = 0; i < len; i++) {
          if (trail[i].speed < minSpeed) minSpeed = trail[i].speed;
          if (trail[i].speed > maxSpeed) maxSpeed = trail[i].speed;
        }
        const speedRange = maxSpeed - minSpeed || 1;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Ink effect: slow = thick & dark, fast = thin & light.
        // Consecutive segments with the same quantized style share one
        // path, so a frame costs dozens of strokes instead of thousands.
        const px = p => cx + (p.x * 0.85 + p.y * 0.35) * scale;
        const py = p => cy - (p.z - 26) * scale * 0.65;

        // Gold is lighter against the parchment, so its ink runs heavier
        const ink = gilded ? '142, 126, 90' : '50, 44, 38';
        const inkBoost = gilded ? 1.9 : 1;

        let runStyle = -1, open = false;
        for (let i = 1; i < len; i++) {
          const age = i / len;
          const speedNorm = (trail[i].speed - minSpeed) / speedRange;
          const widthQ = Math.round((0.3 + (1 - speedNorm) * 1.3) * 10);
          const alphaQ = Math.round(age * (0.05 + (1 - speedNorm) * 0.09) * 200);
          const styleKey = widthQ * 1000 + alphaQ;

          if (styleKey !== runStyle) {
            if (open) ctx.stroke();
            ctx.beginPath();
            ctx.lineWidth = widthQ / 10;
            ctx.strokeStyle = 'rgba(' + ink + ',' + Math.min(alphaQ * inkBoost / 200, 1) + ')';
            ctx.moveTo(px(trail[i - 1]), py(trail[i - 1]));
            runStyle = styleKey;
            open = true;
          }
          ctx.lineTo(px(trail[i]), py(trail[i]));
        }
        if (open) ctx.stroke();
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }
      resize();
      window.addEventListener('resize', resize);

      // Sommerfugleffekten: et klikk forskyver systemet med 10⁻⁹.
      // Ingenting synes nå — men tegningen blir en annen.
      window.addEventListener('pointerdown', function () {
        lx += 1e-9;
        console.log('%cδ = 10⁻⁹ — tegningen du får se er ikke lenger den du ellers ville sett.', plate + 'font-size:11px;font-style:italic;');
      });

      function setInk(gold) {
        gilded = gold;
        draw();
        console.log('%c' + (gilded ? 'Gyllent blekk.' : 'Jerngallusblekk.'), plate + 'font-size:11px;font-style:italic;');
      }

      let typed = '';
      window.addEventListener('keydown', function (e) {
        if (!e.key || e.key.length !== 1) return;
        typed = (typed + e.key.toLowerCase()).slice(-4);
        if (typed === 'kaos') setInk(!gilded);
      });

      // Samme dør, annen nøkkel: kulia.no/#kaos
      function applyHash() {
        if ((location.hash || '').toLowerCase() === '#kaos') setInk(true);
      }
      window.addEventListener('hashchange', applyHash);
      applyHash();

      // Adaptive drawing speed — mimics a hand with a pen.
      // The Lorenz velocity tells us where the pen would naturally
      // slow down (tight spirals) and speed up (sweeping arcs).
      function getDrawSpeed() {
        const vx = sigma * (ly - lx);
        const vy = lx * (rho - lz) - ly;
        const vz = lx * ly - beta * lz;
        const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);
        // Normalize: Lorenz speed typically ranges ~5–45
        const norm = Math.min(Math.max((speed - 5) / 40, 0), 1);
        // Slow: 1 step, fast: 2 steps — with easing
        return 1 + Math.round(norm * norm);
      }

      if (reducedMotion) {
        // Render the finished drawing in one pass: settle onto the
        // attractor first, then trace one full trail.
        for (let i = 0; i < 2500 + maxTrail; i++) step();
        draw();
        return;
      }

      function animate() {
        const steps = getDrawSpeed();
        for (let i = 0; i < steps; i++) step();
        draw();
        requestAnimationFrame(animate);
      }

      animate();
    })();
  </script>
