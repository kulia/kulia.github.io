  <style>
    :root {
      --parchment: #EDE8DF;
      --ink: #1E1C19;
      --warm: #3D3830;
      --muted: rgba(61, 56, 48, 0.48);
      --faint: rgba(61, 56, 48, 0.20);
      --ghost: rgba(61, 56, 48, 0.09);
      --gold: #8E7E5A;
      --gold-line: rgba(142, 126, 90, 0.30);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'EB Garamond', 'Times New Roman', serif;
      background: var(--parchment);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      overflow: hidden;
    }

    /* Cotton paper grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    a {
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Lorenz canvas ── */
    #lorenz {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      animation: watermark-in 4s 2s ease-out forwards;
    }

    @keyframes watermark-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ── Page ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      width: 100%;
    }

    /* ── Upper block: monogram + title at 1/3 ── */
    .upper {
      position: absolute;
      top: 33.3%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .monogram {
      width: 36px;
      height: 37px;
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: rise 1.4s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .monogram svg {
      width: 100%;
      height: 100%;
    }

    .monogram-fill {
      fill: rgba(61, 56, 48, 0.18);
      filter:
        drop-shadow(-0.8px -0.8px 0px rgba(255, 255, 255, 0.65)) drop-shadow(0.8px 0.8px 0.5px rgba(61, 56, 48, 0.12));
    }

    .title {
      font-family: 'EB Garamond', serif;
      font-size: clamp(2.6rem, 5.2vw, 4.6rem);
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding-right: 0.24em;
      user-select: none;
      color: rgba(61, 56, 48, 0.28);
      text-shadow:
        -1px -1px 0px rgba(255, 255, 255, 0.70),
        1px 1px 0px rgba(61, 56, 48, 0.14),
        0px 1px 2px rgba(61, 56, 48, 0.06);
      opacity: 0;
      animation: rise-title 1.4s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Lower block: ornament + tagline at 2/3 ── */
    .lower {
      position: absolute;
      top: 66.6%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.1rem;
      opacity: 0;
      animation: rise 1.4s 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .orn-line {
      width: 32px;
      height: 0;
      border-top: 1px solid var(--gold-line);
    }

    .orn-diamond {
      width: 4px;
      height: 4px;
      border: 1px solid var(--gold);
      opacity: 0.4;
      transform: rotate(45deg);
    }

    .tagline {
      font-family: 'EB Garamond', serif;
      font-size: 0.82rem;
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--muted);
      opacity: 0;
      animation: rise 1.4s 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Footer ── */
    footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 0 4rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: rise 1.4s 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .footer-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.75rem;
    }

    .footer-text {
      font-family: 'EB Garamond', serif;
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--faint);
      text-transform: uppercase;
      min-width: 5.5em;
    }

    .footer-text-left {
      text-align: right;
    }

    .footer-text-right {
      text-align: left;
    }

    .footer-ornament {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .footer-line {
      width: 28px;
      height: 1px;
      background: var(--ghost);
    }

    .footer-diamond {
      width: 4px;
      height: 4px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.4;
    }

    .footer-legal {
      font-family: 'EB Garamond', serif;
      font-size: 0.5rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(61, 56, 48, 0.18);
      text-transform: uppercase;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rise-title {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .upper {
        top: 30%;
      }

      .lower {
        top: 70%;
      }

      footer {
        padding: 0 1.5rem 2rem;
      }

      .footer-ornament {
        display: none;
      }
    }
  </style>
</head>

<body>

  <canvas id="lorenz"></canvas>

    <!-- 2/3: Descriptor -->
    <div class="lower">

    <!-- Footer -->
    <footer>
      <div class="footer-row">
        <span class="footer-text footer-text-left">Lillesand</span>

          <div class="footer-line"></div>

      <div class="footer-legal">Kulia Holding AS &middot; Org.nr 936&thinsp;203&thinsp;825</div>
    </footer>

  <script>
    (function () {
      const canvas = document.getElementById('lorenz');
      const ctx = canvas.getContext('2d');
      let w, h, dpr;

      function resize() {
        dpr = window.devicePixelRatio || 1;
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener('resize', resize);

      // Lorenz system — random seed each visit
      const sigma = 10, rho = 28, beta = 8 / 3;
      const dt = 0.003;
      let lx = (Math.random() - 0.5) * 2;
      let ly = (Math.random() - 0.5) * 2;
      let lz = Math.random() * 5 + 20;

      const maxTrail = 5500;
      const trail = [];

      function step() {
        const dx = sigma * (ly - lx) * dt;
        const dy = (lx * (rho - lz) - ly) * dt;
        const dz = (lx * ly - beta * lz) * dt;
        lx += dx; ly += dy; lz += dz;

        // Velocity for ink effect
        const vx = sigma * (ly - lx);
        const vy = lx * (rho - lz) - ly;
        const vz = lx * ly - beta * lz;
        const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);

        // Centered at 50% of page height — between the 1/3 and 2/3 text
        const scale = Math.min(w, h) * 0.013;
        const cx = w * 0.50;
        const cy = h * 0.50;

        trail.push({
          x: cx + (lx * 0.85 + ly * 0.35) * scale,
          y: cy - (lz - 26) * scale * 0.65,
          speed: speed
        });
        if (trail.length > maxTrail) trail.shift();
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        if (trail.length < 2) return;

        const len = trail.length;

        // Speed range for normalization
        let minSpeed = Infinity, maxSpeed = 0;
        for (let i = 0; i < len; i++) {
          if (trail[i].speed < minSpeed) minSpeed = trail[i].speed;
          if (trail[i].speed > maxSpeed) maxSpeed = trail[i].speed;
        }
        const speedRange = maxSpeed - minSpeed || 1;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        for (let i = 1; i < len; i++) {
          const age = i / len;
          const speedNorm = (trail[i].speed - minSpeed) / speedRange;

          // Ink effect: slow = thick & dark, fast = thin & light
          const lineWidth = 0.3 + (1 - speedNorm) * 1.3;
          const alphaBase = 0.05 + (1 - speedNorm) * 0.09;
          const a = age * alphaBase;

          ctx.beginPath();
          ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
          ctx.lineTo(trail[i].x, trail[i].y);
          ctx.strokeStyle = 'rgba(50, 44, 38,' + a + ')';
          ctx.lineWidth = lineWidth;
          ctx.stroke();
        }
      }

      function animate() {
        step(); step();
        draw();
        requestAnimationFrame(animate);
      }

      // Pre-trace so butterfly is present on load
      for (let i = 0; i < 3500; i++) step();

      animate();
    })();
  </script>
